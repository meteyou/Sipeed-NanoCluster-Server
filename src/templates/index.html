<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipeed NanoCluster</title>

    <!-- Fonts: JetBrains Mono (data) + DM Sans (body) — graceful fallback if offline -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Subtle noise texture overlay -->
<div class="noise-overlay" aria-hidden="true"></div>

<!-- Header -->
<header class="header">
    <div class="header-inner">
        <h1 class="header-title">Sipeed NanoCluster</h1>
        <div class="header-summary" id="header-summary"></div>
    </div>
</header>

<!-- Main Content -->
<main class="main">
    <div class="nodes-grid" id="nodes-grid"></div>
    <div class="fan-card" id="fan-card"></div>
</main>

<script type="text/javascript">
// ══════════════════════════════════════════════════════════════════════
// Sipeed NanoCluster — Dashboard Controller
// ══════════════════════════════════════════════════════════════════════

let isFirstRender = true;

// ── Formatters ────────────────────────────────────────────────────────

function formatBytes(bytes, decimals = 1) {
    if (bytes == null || bytes === 0) return '0 B';
    const k = 1024;
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.min(Math.floor(Math.log(Math.abs(bytes)) / Math.log(k)), units.length - 1);
    return parseFloat((bytes / Math.pow(k, i)).toFixed(decimals)) + ' ' + units[i];
}

function formatRate(bytes) {
    return formatBytes(bytes) + '/s';
}

function formatUptime(sec) {
    if (!sec || sec <= 0) return '—';
    const d = Math.floor(sec / 86400);
    const h = Math.floor((sec % 86400) / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const p = [];
    if (d > 0) p.push(d + 'd');
    if (h > 0) p.push(h + 'h');
    p.push(m + 'm');
    return p.join(' ');
}

function formatFreq(mhz) {
    if (!mhz) return '—';
    return mhz >= 1000 ? (mhz / 1000).toFixed(2) + ' GHz' : Math.round(mhz) + ' MHz';
}

function formatTime(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString();
}

// ── Color helpers ─────────────────────────────────────────────────────

function pctColor(pct) {
    if (pct < 60) return 'var(--color-success)';
    if (pct < 80) return 'var(--color-warning)';
    return 'var(--color-danger)';
}

function tempColor(t) {
    if (t == null) return 'var(--color-dim)';
    if (t < 40) return 'var(--color-success)';
    if (t < 55) return 'var(--color-accent)';
    if (t < 65) return 'var(--color-warning)';
    return 'var(--color-danger)';
}

function diskBadge(type) {
    if (!type) return 'badge-other';
    const t = type.toLowerCase();
    if (t === 'nvme') return 'badge-nvme';
    if (t === 'emmc') return 'badge-emmc';
    if (t === 'sd')   return 'badge-sd';
    if (t.includes('usb'))  return 'badge-usb';
    if (t.includes('sata')) return 'badge-sata';
    return 'badge-other';
}

// ── UI Components ─────────────────────────────────────────────────────

function bar(pct, color) {
    const p = Math.max(0, Math.min(100, pct || 0));
    return `<div class="progress-bar">
        <div class="progress-fill" style="width:${p}%;background:${color || pctColor(p)}"></div>
    </div>`;
}

// ── Node Card Builder ─────────────────────────────────────────────────

function renderNodeCard(node, index) {
    const sys = node.system;
    const online = node.online && node.enabled;
    const disabled = !node.enabled;

    let sc, st;
    if (disabled)       { sc = 'status-disabled'; st = 'Disabled'; }
    else if (online)    { sc = 'status-online';   st = 'Online'; }
    else                { sc = 'status-offline';  st = 'Offline'; }

    const desc = (sys?.description) || node.description || '';

    // Animation only on first render
    const anim = isFirstRender ? ` animate-in" style="animation-delay:${index * 0.06}s` : '';

    let body = '';

    // ── Temperature ───────────────────────────────────────────────
    const temp = node.temperature;
    const tc = tempColor(temp);
    body += `<div class="metric-section temp-section">
        <div class="temp-display" style="color:${tc}">
            ${temp != null ? temp.toFixed(1) + '<span class="temp-unit">°C</span>' : '—'}
        </div>
    </div>`;

    if (sys) {
        // ── CPU ───────────────────────────────────────────────────
        const cpu = sys.cpu || {};
        const cpuPct = cpu.usage_percent ?? 0;
        const cores = cpu.per_core_percent || [];
        const freq = cpu.frequency || {};
        const load = cpu.load_average || [];

        let coresHtml = '';
        if (cores.length) {
            coresHtml = '<div class="cpu-cores">';
            cores.forEach((p, i) => {
                coresHtml += `<div class="core-bar-wrapper">
                    <span class="core-label">C${i}</span>
                    <div class="core-bar"><div class="core-bar-fill" style="width:${p}%;background:${pctColor(p)}"></div></div>
                    <span class="core-pct">${p.toFixed(0)}%</span>
                </div>`;
            });
            coresHtml += '</div>';
        }

        body += `<div class="metric-section">
            <div class="metric-header">
                <span class="metric-label">CPU</span>
                <span class="metric-value">${cpuPct.toFixed(1)}%</span>
            </div>
            ${bar(cpuPct)}
            ${coresHtml}
            <div class="metric-details">
                ${cpu.model && cpu.model !== 'Unknown' ? `<span>${cpu.model}</span>` : ''}
                <span>${formatFreq(freq.current)}${freq.max ? ' / ' + formatFreq(freq.max) : ''}</span>
                ${load.length ? `<span>Load ${load.join(' · ')}</span>` : ''}
            </div>
        </div>`;

        // ── Memory ────────────────────────────────────────────────
        const mem = sys.memory || {};
        const memPct = mem.percent ?? 0;

        let swapHtml = '';
        if (mem.swap_total > 0) {
            swapHtml = `<div class="sub-metric">
                <div class="sub-metric-header">
                    <span class="sub-label">Swap</span>
                    <span class="sub-value">${formatBytes(mem.swap_used)} / ${formatBytes(mem.swap_total)} · ${(mem.swap_percent ?? 0).toFixed(0)}%</span>
                </div>
                ${bar(mem.swap_percent)}
            </div>`;
        }

        body += `<div class="metric-section">
            <div class="metric-header">
                <span class="metric-label">Memory</span>
                <span class="metric-value">${memPct.toFixed(0)}%</span>
            </div>
            <div class="sub-metric-header">
                <span class="sub-value">${formatBytes(mem.used ?? 0)} / ${formatBytes(mem.total ?? 0)}</span>
            </div>
            ${bar(memPct)}
            ${swapHtml}
        </div>`;

        // ── Storage ───────────────────────────────────────────────
        const disks = sys.disks || [];
        if (disks.length) {
            let dh = '';
            disks.forEach(d => {
                dh += `<div class="disk-item">
                    <div class="disk-header">
                        <span class="disk-type-badge ${diskBadge(d.type)}">${d.type || '?'}</span>
                        <span class="disk-mount" title="${d.device}">${d.mountpoint}</span>
                        <span class="disk-usage">${formatBytes(d.used)} / ${formatBytes(d.total)} · ${(d.percent ?? 0).toFixed(0)}%</span>
                    </div>
                    ${bar(d.percent)}
                    <div class="disk-io">
                        <span>R ${formatRate(d.io_read_bytes_per_sec)}</span>
                        <span>W ${formatRate(d.io_write_bytes_per_sec)}</span>
                    </div>
                </div>`;
            });
            body += `<div class="metric-section">
                <div class="metric-header"><span class="metric-label">Storage</span></div>
                ${dh}
            </div>`;
        }

        // ── Network ───────────────────────────────────────────────
        const nets = sys.network || [];
        if (nets.length) {
            let nh = '';
            nets.forEach(n => {
                nh += `<div class="net-item">
                    <div class="net-header">
                        <span class="net-name">${n.name}</span>
                        ${n.ip ? `<span class="net-ip">${n.ip}</span>` : ''}
                    </div>
                    <div class="net-rates">
                        <span class="net-down">▼ ${formatRate(n.bytes_recv_per_sec)}</span>
                        <span class="net-up">▲ ${formatRate(n.bytes_sent_per_sec)}</span>
                    </div>
                    <div class="net-totals">
                        <span>▼ ${formatBytes(n.bytes_recv_total)}</span>
                        <span>▲ ${formatBytes(n.bytes_sent_total)}</span>
                        <span class="net-since-boot">since boot</span>
                    </div>
                </div>`;
            });
            body += `<div class="metric-section">
                <div class="metric-header"><span class="metric-label">Network</span></div>
                ${nh}
            </div>`;
        }
    }

    // ── Footer ────────────────────────────────────────────────────
    let fp = [];
    if (sys) {
        if (sys.uptime)    fp.push(`<span>⏱ ${formatUptime(sys.uptime)}</span>`);
        if (sys.os) {
            const on = sys.os.name !== 'Unknown' ? sys.os.name : '';
            const ok = sys.os.kernel || '';
            if (on || ok) fp.push(`<span>${on}${ok ? ' · ' + ok : ''}</span>`);
        }
        if (sys.processes) fp.push(`<span>${sys.processes} procs</span>`);
    }
    if (node.last_update) fp.push(`<span class="last-update">${formatTime(node.last_update)}</span>`);

    return `<div class="node-card ${sc}${anim}">
        <div class="node-header">
            <div class="node-identity">
                <span class="slot-badge">Slot ${node.slot}</span>
                <div class="node-names">
                    <span class="node-name">${node.name}</span>
                    ${desc ? `<span class="node-description">${desc}</span>` : ''}
                </div>
            </div>
            <div class="node-meta">
                <span class="node-ip">${node.ip}:${node.port}</span>
                <span class="status-badge ${sc}"><span class="status-dot"></span>${st}</span>
            </div>
        </div>
        <div class="node-body">${body}</div>
        ${fp.length ? `<div class="node-footer">${fp.join('')}</div>` : ''}
    </div>`;
}

// ── Fan Card ──────────────────────────────────────────────────────────

// ── Fan state (preserved across refreshes) ────────────────────────────
let fanSettingsOpen = false;

function renderFanCard(fan) {
    if (!fan) return '';
    const cfg = fan.config || {};
    const speed = fan.speed ?? 0;
    const mode = fan.mode || 'auto';
    const isManual = mode === 'manual';
    const sc = speed > 80 ? 'var(--color-danger)' : speed > 50 ? 'var(--color-warning)' : 'var(--color-success)';

    const modeLabel = isManual ? 'Manual' : 'Auto';
    const modeBadgeClass = isManual ? 'fan-mode-manual' : 'fan-mode-auto';

    return `<div class="fan-inner">
        <div class="fan-header">
            <div class="fan-header-left">
                <h2>Fan Control</h2>
                <span class="fan-mode-badge ${modeBadgeClass}">${modeLabel}</span>
            </div>
            <div class="fan-speed" style="color:${sc}">${speed.toFixed(0)}%</div>
        </div>
        <div class="fan-bar-wrapper">${bar(speed, sc)}</div>

        <!-- Config Details (read-only summary, directly below speed) -->
        <div class="fan-details">
            <div class="fan-detail">
                <span class="fan-detail-label">Temp Range</span>
                <span class="fan-detail-value">${cfg.min_temp ?? '—'}°C – ${cfg.max_temp ?? '—'}°C</span>
            </div>
            <div class="fan-detail">
                <span class="fan-detail-label">Speed Range</span>
                <span class="fan-detail-value">${cfg.min_speed ?? '—'}% – ${cfg.max_speed ?? '—'}%</span>
            </div>
            <div class="fan-detail">
                <span class="fan-detail-label">PWM</span>
                <span class="fan-detail-value">${cfg.pwm_frequency ?? '—'} Hz</span>
            </div>
        </div>

        <!-- Settings toggle -->
        <button class="btn btn-ghost fan-settings-toggle" onclick="toggleFanSettings()">
            ${fanSettingsOpen ? '▲ Hide Settings' : '▼ Edit Settings'}
        </button>

        <!-- Editable Settings Panel (includes manual override) -->
        <div class="fan-settings" id="fan-settings" style="display:${fanSettingsOpen ? 'block' : 'none'}">

            <!-- Manual Override -->
            <div class="fan-override">
                <div class="fan-override-row">
                    <label class="fan-override-label">Manual Speed</label>
                    <div class="fan-override-controls">
                        <input type="range" id="fan-manual-slider" min="0" max="100" value="${isManual ? speed : 50}"
                               oninput="document.getElementById('fan-manual-speed').value=this.value">
                        <div class="fan-override-input-group">
                            <input type="number" id="fan-manual-speed" min="0" max="100" value="${isManual ? speed : 50}"
                                   oninput="document.getElementById('fan-manual-slider').value=this.value">
                            <span class="fan-input-unit">%</span>
                        </div>
                        <button class="btn btn-primary" onclick="setFanManual()">Set</button>
                        <button class="btn ${isManual ? 'btn-accent' : 'btn-dim'}" onclick="setFanAuto()" ${!isManual ? 'disabled' : ''}>Auto</button>
                    </div>
                </div>
            </div>

            <!-- Editable Config Fields -->
            <div class="fan-settings-grid">
                <div class="fan-setting-group">
                    <label class="fan-setting-label">Temp Range (°C)</label>
                    <div class="fan-setting-row">
                        <div class="fan-input-with-prefix">
                            <span class="fan-input-prefix">Min</span>
                            <input type="number" id="cfg-min-temp" value="${cfg.min_temp ?? 40}" min="0" max="120">
                        </div>
                        <span class="fan-setting-sep">–</span>
                        <div class="fan-input-with-prefix">
                            <span class="fan-input-prefix">Max</span>
                            <input type="number" id="cfg-max-temp" value="${cfg.max_temp ?? 70}" min="0" max="120">
                        </div>
                    </div>
                </div>
                <div class="fan-setting-group">
                    <label class="fan-setting-label">Speed Range (%)</label>
                    <div class="fan-setting-row">
                        <div class="fan-input-with-prefix">
                            <span class="fan-input-prefix">Min</span>
                            <input type="number" id="cfg-min-speed" value="${cfg.min_speed ?? 30}" min="0" max="100">
                        </div>
                        <span class="fan-setting-sep">–</span>
                        <div class="fan-input-with-prefix">
                            <span class="fan-input-prefix">Max</span>
                            <input type="number" id="cfg-max-speed" value="${cfg.max_speed ?? 100}" min="0" max="100">
                        </div>
                    </div>
                </div>
                <div class="fan-setting-group">
                    <label class="fan-setting-label">PWM Frequency (Hz)</label>
                    <div class="fan-setting-row">
                        <div class="fan-input-with-prefix fan-setting-field-wide">
                            <input type="number" id="cfg-pwm-freq" value="${cfg.pwm_frequency ?? 50}" min="1" max="100000">
                        </div>
                    </div>
                </div>
            </div>
            <div class="fan-settings-actions">
                <button class="btn btn-primary" onclick="saveFanConfig()">Save to Config</button>
                <span class="fan-save-status" id="fan-save-status"></span>
            </div>
        </div>
    </div>`;
}

// ── Fan API actions ───────────────────────────────────────────────────

async function setFanManual() {
    const speed = parseInt(document.getElementById('fan-manual-speed').value, 10);
    if (isNaN(speed) || speed < 0 || speed > 100) return;
    try {
        const res = await fetch('/api/fan/override', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({speed}),
        });
        if (res.ok) refresh();
    } catch (e) { console.error('Failed to set fan override:', e); }
}

async function setFanAuto() {
    try {
        const res = await fetch('/api/fan/auto', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
        });
        if (res.ok) refresh();
    } catch (e) { console.error('Failed to set fan auto:', e); }
}

function toggleFanSettings() {
    fanSettingsOpen = !fanSettingsOpen;
    const el = document.getElementById('fan-settings');
    if (el) el.style.display = fanSettingsOpen ? 'block' : 'none';
    // Re-render to update toggle button text
    const toggleBtn = document.querySelector('.fan-settings-toggle');
    if (toggleBtn) toggleBtn.textContent = fanSettingsOpen ? '▲ Hide Settings' : '▼ Edit Settings';
}

async function saveFanConfig() {
    const payload = {
        min_temp: parseInt(document.getElementById('cfg-min-temp').value, 10),
        max_temp: parseInt(document.getElementById('cfg-max-temp').value, 10),
        min_speed: parseInt(document.getElementById('cfg-min-speed').value, 10),
        max_speed: parseInt(document.getElementById('cfg-max-speed').value, 10),
        pwm_frequency: parseInt(document.getElementById('cfg-pwm-freq').value, 10),
    };

    const statusEl = document.getElementById('fan-save-status');
    try {
        const res = await fetch('/api/fan/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.success) {
            if (statusEl) { statusEl.textContent = '✓ Saved'; statusEl.className = 'fan-save-status fan-save-ok'; }
            refresh();
        } else {
            if (statusEl) { statusEl.textContent = '✗ ' + (data.error || 'Error'); statusEl.className = 'fan-save-status fan-save-err'; }
        }
    } catch (e) {
        if (statusEl) { statusEl.textContent = '✗ Network error'; statusEl.className = 'fan-save-status fan-save-err'; }
        console.error('Failed to save fan config:', e);
    }
    // Clear status after 3s
    setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 3000);
}

// ── Header Summary ────────────────────────────────────────────────────

function renderSummary(data) {
    const nodes = data.nodes || [];
    const total = nodes.length;
    const on = nodes.filter(n => n.online && n.enabled).length;
    const off = nodes.filter(n => !n.enabled).length;
    const fan = data.fan?.speed;

    let p = [`${on}/${total - off} online`];
    if (off > 0) p.push(`${off} disabled`);
    if (fan != null) p.push(`Fan ${fan.toFixed(0)}%`);
    return `<span>${p.join('  ·  ')}</span>`;
}

// ── Refresh Loop ──────────────────────────────────────────────────────

async function refresh() {
    try {
        const res = await fetch(`/api/dashboard?t=${Date.now()}`);
        const data = await res.json();
        if (!data.success) return;

        document.getElementById('header-summary').innerHTML = renderSummary(data);
        document.getElementById('nodes-grid').innerHTML =
            (data.nodes || []).map((n, i) => renderNodeCard(n, i)).join('');
        document.getElementById('fan-card').innerHTML = renderFanCard(data.fan);

        isFirstRender = false;
    } catch (e) {
        console.error('Dashboard refresh failed:', e);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    refresh();
    setInterval(refresh, 5000);
});
</script>

</body>
</html>
